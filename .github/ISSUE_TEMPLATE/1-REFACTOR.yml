name: REFACTOR
title: "[REFACTOR]"
description: Request a new refactor
projects: "AutoStrike-EIP/5"
labels: ["refactor"]
body:
  - type: textarea
    id: refactor_description
    attributes:
      label: Describe the refactor
      description: A clear and concise description of what the refactor is.
      placeholder: "ex: Modify the button component for better accessibility."
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      placeholder: |
        ex:
        - Possible implementation ideas
        - Resources
        - Screenshots
        - Any other relevant information.
  - type: checkboxes
    attributes:
      label: Pre-submission checklist
      description: "Please ensure you have completed the following before submitting your refactor request:"
      options:
        - label: I have SET the appropriate label
          required: true
        - label: I have UNSET the issue tag
          required: true
        - label: I have SET the appropriate project
          required: true
        - label: I have SET the appropriate milestone
          required: true
    validations:
      required: true

