name: FEAT
title: "[FEAT]"
description: Request a new feature
projects: "AutoStrike-EIP/5"
labels: ["feature"]
body:
  - type: textarea
    id: feature_description
    attributes:
      label: Describe the feature
      description: A clear and concise description of what the feature is.
      placeholder: "ex: Add new button to the homepage."
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      placeholder: |
        ex:
        - Possible implementation ideas
        - Resources
        - Screenshots
        - Any other relevant information.
  - type: checkboxes
    attributes:
      label: Pre-submission checklist
      description: "Please ensure you have completed the following before submitting your feature request:"
      options:
        - label: I have SET the appropriate label
          required: true
        - label: I have UNSET the issue tag
          required: true
        - label: I have SET the appropriate project
          required: true
        - label: I have SET the appropriate milestone
          required: true
    validations:
      required: true

