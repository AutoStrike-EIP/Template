name: Epitech Mirroring

on:
  push:
    branches-ignore:
      - "mirror-ignore-**"
  pull_request:
    branches-ignore:
      - "mirror-ignore-**"

env:
  MIRROR_URL: git@github.com:EpitechPGE3-2025/G-EIP-600-REN-6-1-eip-4.git
  CURRENT_REPO: AutoStrike/AutoStrike

jobs:
  push-to-mirror:
    name: Push to mirror
    if: github.repository == ${{ env.CURRENT_REPO }} && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: run_tests

    steps:
      - name: Checking out repository...
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pushing to mirror repository...
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}

